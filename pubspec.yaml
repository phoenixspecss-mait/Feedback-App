name: Feedback_App
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.1
  flutter_bloc: ^8.1.6
  get_it: ^7.7.0
  cupertino_icons: ^1.0.8
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  path: ^1.9.1
  image_picker: ^1.1.2
  local_auth: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^5.0.0
  test: ^1.26.2

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#FFFFFF" 
  adaptive_icon_foreground: "assets/images/logo.png"
flutter:
  uses-material-design: true
  fonts:
    - family: medifont
      fonts:
        - asset: assets/fonts/Outfit-VariableFont_wght.ttf
    - family: medifont2
      fonts:
        - asset: assets/fonts/BBHHegarty-Regular.ttf
  assets:
    - assets/images/
